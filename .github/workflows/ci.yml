name: ci
on: [push, pull_request]
jobs:
  pendantd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        working-directory: pendantd
        run: |
          pip install websockets jsonschema pyyaml watchfiles pytest pytest-asyncio
      - name: pytest
        working-directory: pendantd
        env:
          PYTHONPATH: src
        run: pytest -v
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - name: validate schemas parse as JSON
        run: |
          python - <<'PY'
          import json, glob
          for f in sorted(glob.glob("schemas/v1/*.schema.json")):
              json.loads(open(f).read())
              print(f, "ok")
          PY
